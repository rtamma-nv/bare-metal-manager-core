{{- if .Values.imagePullSecret.create }}
## Docker registry pull secret for the flow namespace.
##
## Rendered as a pre-install hook (weight -10) so it lands BEFORE the
## Deployment starts pulling. Without this, the flow pod hits 401 on the
## first ImagePull attempt and ImagePullBackOffs until helm gives up.
## Same ordering pattern as nico-rest-common/templates/secrets.yaml.
##
## The actual credential payload is rendered into
## .Values.imagePullSecret.dockerconfigjson by setup.sh phase 7i from
## REGISTRY_PULL_SECRET. The chart default is the empty-auth placeholder
## ({"auths":{}}) so installs against pre-loaded / air-gapped clusters
## remain valid without overrides.
apiVersion: v1
kind: Secret
metadata:
  name: image-pull-secret
  namespace: {{ include "nico-flow.namespace" . }}
  labels:
    {{- include "nico-flow.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ .Values.imagePullSecret.dockerconfigjson | quote }}
{{- end }}
