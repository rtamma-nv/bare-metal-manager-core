nameOverride: ""
namespaceOverride: ""

image:
  name: nico-rest-cert-manager

replicaCount: 1

config:
  caCommonName: "NICo Local Dev CA"
  caOrganization: "NVIDIA"
  caCertFile: "/etc/pki/ca/tls.crt"
  caKeyFile: "/etc/pki/ca/tls.key"
  tlsPort: 8000
  insecurePort: 8001
  caBaseDns: "nico.local"
  debug: false

secrets:
  # -- Name of the Secret containing the CA signing cert and key (tls.crt / tls.key).
  # This Secret must exist before deploying this chart — it is NOT created by any sub-chart.
  # In production it is typically provisioned by Vault agent injection.
  # For local dev, it is created by make kind-reset-infra (setup-local.sh).
  caSigningSecret: ca-signing-secret

service:
  type: ClusterIP
  httpsPort: 8000
  httpPort: 8001

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "250m"
