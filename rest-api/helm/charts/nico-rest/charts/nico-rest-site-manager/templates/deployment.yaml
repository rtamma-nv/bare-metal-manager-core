apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nico-rest-site-manager.name" . }}
  namespace: {{ include "nico-rest-site-manager.namespace" . }}
  labels:
    {{- include "nico-rest-site-manager.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "nico-rest-site-manager.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nico-rest-site-manager.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "nico-rest-site-manager.name" . }}
      containers:
        - name: site-manager
          image: "{{ include "nico-rest-site-manager.image" . }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          args:
            - --listen-port={{ .Values.args.listenPort }}
            - --creds-manager-url={{ .Values.args.credsManagerUrl }}
            - --tls-cert-path={{ .Values.args.tlsCertPath }}
            - --tls-key-path={{ .Values.args.tlsKeyPath }}
            - --namespace={{ include "nico-rest-site-manager.namespace" . }}
            {{- if .Values.args.debug }}
            - --debug
            {{- end }}
          ports:
            - containerPort: {{ .Values.service.port }}
              name: https
          volumeMounts:
            - name: tls-certs
              mountPath: /etc/tls
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.service.port }}
              scheme: HTTPS
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.service.port }}
              scheme: HTTPS
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: tls-certs
          secret:
            secretName: {{ .Values.certificate.secretName }}
