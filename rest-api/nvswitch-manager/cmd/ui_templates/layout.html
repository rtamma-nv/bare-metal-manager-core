<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NV-Switch Manager</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Header */
        header {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 16px 0;
            margin-bottom: 24px;
        }
        
        header .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo {
            font-size: 20px;
            font-weight: 600;
            color: #58a6ff;
        }
        
        nav {
            display: flex;
            gap: 8px;
        }
        
        nav a {
            color: #c9d1d9;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        
        nav a:hover {
            background: #30363d;
        }
        
        nav a.active {
            background: #238636;
            color: white;
        }
        
        /* Cards */
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #30363d;
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #30363d;
        }
        
        th {
            font-weight: 600;
            color: #8b949e;
            font-size: 12px;
            text-transform: uppercase;
        }
        
        tr:hover {
            background: #1c2128;
        }
        
        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid #30363d;
            background: #21262d;
            color: #c9d1d9;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn:hover {
            background: #30363d;
        }
        
        .btn-primary {
            background: #238636;
            border-color: #238636;
            color: white;
        }
        
        .btn-primary:hover {
            background: #2ea043;
        }
        
        .btn-danger {
            background: #da3633;
            border-color: #da3633;
            color: white;
        }
        
        .btn-danger:hover {
            background: #f85149;
        }
        
        .btn-sm {
            padding: 4px 10px;
            font-size: 12px;
        }
        
        /* Status badges */
        .status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-completed {
            background: #238636;
            color: white;
        }
        
        .status-failed {
            background: #da3633;
            color: white;
        }
        
        .status-cancelled {
            background: #6e7681;
            color: white;
        }
        
        .status-queued {
            background: #1f6feb;
            color: white;
        }
        
        .status-active {
            background: #9e6a03;
            color: white;
        }
        
        /* Forms */
        .form-group {
            margin-bottom: 12px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #8b949e;
        }
        
        select, input[type="text"] {
            width: 100%;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: #c9d1d9;
            font-size: 14px;
        }
        
        select:focus, input[type="text"]:focus {
            outline: none;
            border-color: #58a6ff;
        }
        
        /* Filters */
        .filters {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        
        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .filter-group label {
            font-size: 14px;
            color: #8b949e;
        }
        
        .filter-group select {
            width: auto;
            min-width: 150px;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 24px;
            max-width: 500px;
            width: 100%;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: #8b949e;
            font-size: 24px;
            cursor: pointer;
        }
        
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #30363d;
        }
        
        /* Monospace for UUIDs/IPs */
        .mono {
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 13px;
        }
        
        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #8b949e;
        }
        
        /* Error state */
        .error-card {
            background: #2d1f1f;
            border-color: #da3633;
        }
        
        /* Toast notifications */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 6px;
            background: #238636;
            color: white;
            z-index: 2000;
            display: none;
        }
        
        .toast.error {
            background: #da3633;
        }
        
        .toast.active {
            display: block;
        }
        
        /* Refresh indicator */
        .refresh-info {
            font-size: 12px;
            color: #6e7681;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">NV-Switch Manager</div>
            <nav>
                <a href="/switches" {{if eq .Page "switches"}}class="active"{{end}}>Switches</a>
                <a href="/updates" {{if eq .Page "updates"}}class="active"{{end}}>Updates</a>
            </nav>
        </div>
    </header>
    
    <main class="container">
        {{if eq .Page "switches"}}
            {{template "switches.html" .}}
        {{else if eq .Page "updates"}}
            {{template "updates.html" .}}
        {{else if eq .Page "error"}}
            <div class="card error-card">
                <h2>{{.ErrorTitle}}</h2>
                <p style="margin-top: 12px;">{{.ErrorMessage}}</p>
            </div>
        {{end}}
    </main>
    
    <div id="toast" class="toast"></div>
    
    <script>
        function showToast(message, isError) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast active' + (isError ? ' error' : '');
            setTimeout(() => {
                toast.className = 'toast';
            }, 3000);
        }
        
        function openModal(id) {
            document.getElementById(id).classList.add('active');
        }
        
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }
        
        // Close modal on escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal.active').forEach(m => m.classList.remove('active'));
            }
        });
    </script>
</body>
</html>
